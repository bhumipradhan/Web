<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #282c34;
            color: white;
        }

        .spinner {
            width: 80px;
            height: 80px;
            border: 8px solid rgba(255, 255, 255, 0.1);
            border-top: 8px solid #61dafb;
            border-radius: 50%;
            
            /* Animation properties */
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .btn {
            margin-top: 50px;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #61dafb;
            color: #282c34;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 15px rgba(97, 218, 251, 0.4);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300%;
            height: 300%;
            background-color: rgba(255, 255, 255, 0.2);
            transition: all 0.5s ease;
            transform: translate(-50%, -50%) scale(0);
            border-radius: 50%;
            z-index: 0;
        }

        .btn:active::after {
            transform: translate(-50%, -50%) scale(1);
            transition: 0s;
        }

        .button-text {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <h2>Loading Spinner</h2>
    <div class="spinner"></div>

    <button class="btn">
        <span class="button-text">Hover & Click Me</span>
    </button>
</body>
</html>
