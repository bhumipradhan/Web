<!DOCTYPE html>
<html>
<head>
  <title>CSS Syntax</title>
  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Internal CSS -->
  <style>
    h2 {
      color: blue;
      text-align: center;
    }
    p {
      color: green;
      font-size: 16px;
    }
  </style>

</head>
<body>
  <!-- Inline CSS -->
  <h2 style="color:red;">I am Inline CSS</h2>
  
  <p>I am styled using internal CSS.</p>
  <p class="external">I am styled using external CSS.</p>
</body>
</html>
