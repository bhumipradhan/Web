<!DOCTYPE html>
<html>
<head>
  <style>
    /* Outer container */
    .box {
      width: 300px;          
      padding: 20px;          
      border: 5px solid red;  
      margin: 30px;       
      background-color: lightyellow; 
    }

    /* Inner box */
    .content {
      background-color: lightgreen;
      text-align: center;
      padding: 10px;
    }
  </style>
</head>
<body>
  <h2>CSS Box Model</h2>

  <div class="box">
    Outer Box (padding + border + margin)
    <div class="content">
      Content Area
    </div>
  </div>
</body>
</html>
