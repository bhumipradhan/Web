<!DOCTYPE html>
<html>
<head>

  <style>
    ul {
      list-style-type: square;
      color: blue;
    }
    ol {
      color: green;
    }
    table {
      width: 20%;
      border-collapse: collapse;
      margin: 10px auto;
    }
    table, th, td {
      border: 2px solid black;
      padding: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <ul>
    <li>Apple</li>
    <li>Banana</li>
  </ul>

  <ol type="1">
    <li>First</li>
    <li>Second</li>
  </ol>

  <table>
    <tr>
      <th>Name</th>
      <th>Age</th>
    </tr>
    <tr>
      <td>Mandeep</td>
      <td>22</td>
    </tr>
    <tr>
      <td>Nami</td>
      <td>21</td>
    </tr>
  </table>
</body>
</html>
