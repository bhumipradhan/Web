<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        
        #div1 {
            width: 300px;
            height: 150px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            text-align: center;
            line-height: 150px;
            font-size: 32px;
            font-weight: bold;
            margin: 50px auto;
            
        
            text-shadow: 3px 2px green;
            
        
            box-shadow: 10px 10px blue;
        }
        
        .explanation {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="explanation">
        <h3>What is the use of CSS shadow effects?</h3>
        <p>CSS shadow effects (text-shadow and box-shadow) are used to add depth, emphasis, and a 3D-like appearance to elements and text, making elements stand out from the background.</p>
    </div>

    <div id="div1">
        CSIT Exam
    </div>
</body>
</html>
