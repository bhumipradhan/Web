<!DOCTYPE html>
<html>
<head>
    <style>
        .container {
            position: relative;
            width: 500px;
            height: 400px;
            border: 2px solid black;
            padding: 10px;
            margin-top: 20px;
        }
        
        p {
            width: 150px;
            padding: 15px;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        #p1 {
            position: relative;
            top: 20px;
            left: 20px;
            background-color: blue;
        }

        #p2 {
            float: right;
            background-color: green;
            margin: 10px;
        }

        #p3 {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background-color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <p id="p1">p1: I am positioned relative to my normal placement.</p>
        <p id="p2">p2: I am floated to the right.</p>
        <p id="p3">p3: I am positioned absolute at the bottom right.</p>
    </div>
</body>
</html>
