<!DOCTYPE html>
<html>
<head>
  <style>
    /*  rounded box */
    .rounded{
      width: 200px;
      height: 100px;
      background-color: lightblue;
      border-radius: 25px; 
      margin: 20px auto;
      text-align: center;
      line-height: 100px;
      font-weight: bold;
    }

    /* shadow box*/
    .shadow {
      width: 200px;
      height: 100px;
      background-color: lightgreen;
      box-shadow: 10px 10px 15px gray; 
      margin: 20px auto;
      text-align: center;
      line-height: 100px;
      font-weight: bold;
    }

    /* Text with shadow */
    .text {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: darkblue;
      text-shadow: 3px 3px 3px gray; 
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h2 class="text">My text has shadow</h2>

  <div class="rounded">My corner are rounded</div>

  <div class="shadow">I have shadow around me</div>
</body>
</html>
