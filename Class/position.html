<html>
    <head>
        <title>Position</title>
    </head>
    <body>
        <h1>Animation</h1>
        <div></div>
        </div>
       <style>
        @keyframes myanimation {
            0%{
                top:0;
                left:0;
            }
            25%{
                background-color: blueviolet;
                top:0;
                left: 540;
                scale:0.5;
            }
            50%{
                top:200;
                left: 540;
                border-radius: 50%;
            }
            75%{
                top:200;
                left:0;
            }
            100%{
                top:0;
                left:0;
            }
        }
        
         div{
            border: 1px solid black;
            background-color: red;
            height:124px;
            width:124px;
            position:relative;
            animation-name: myanimation;
            animation-duration:5s ;
            animation-iteration-count: infinite;
            animation-delay: 2s;
         }
         @keyframes changeheader {
            0%{
                opacity: 1;
            }
            25%{
                opacity: 0.75;
            }
            50%{
                opacity: 0;
            }
            75%{
                opacity: 0.25;
            }
            100%{
                opacity: 1;
            }
         }
         h1{
            position: relative;
            animation-name:changeheader ;
            animation-delay: 5s;
            animation-duration: 5s;
            animation-iteration-count: infinite;
         }
       </style> 
    </body>
</html>
