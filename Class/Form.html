<html>
<head>

    <title>Form</title>
</head>
<body>
    <h1>Form</h1>
    <form>
        <fieldset>
            <legend>User Details</legend>
        <div>
            Name:
            <input type="text" name="designation" placeholder="Mr/Ms/Mrs" pattern="^(Ms|Mr|Mrs)$">
            <input type="text" name="First" placeholder="First Name">
            <input type="text" name="Middle" placeholder="Middle Name">
            <input type="text" name="Last" placeholder="Last Name">

        </div>
        <br>
        <div><label>Email:</label>
            <input type="text"></div>
        <br>
         <div>Phone:
            <input type="text" name="code" value="+977" readonly>
            <input type="number">
        </div>
        <br>

            Gender:
            <input type="radio" name="gender" value="M">
            Male
            <input type="radio" name="gender">
            <label>Female</label>
            <input type="radio">
            <label>Other</label>
    
        <br>
       Photo:
       <input type="file" name="photo">
        <br>
        <input type="checkbox" value="accept" checked disabled>I accept the terms
        <br>
      <input type="submit" value="Submit">
      <input type="reset" value="Clear">
        </fieldset>

    </form>
</body>
</html>
