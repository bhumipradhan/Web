<!DOCTYPE html>
<html>
<head>
    <title>17.Survey Form</title>
    <style>
        .group { margin-bottom: 15px; }
    </style>
</head>
<body>

<h3>Survey Form</h3>

<form action="#" method="post">
    <fieldset class="group">
        <legend>Personal Info</legend>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>
    </fieldset>

    <fieldset class="group">
        <legend>Experience</legend>
        <label for="rating">Rate our service (1-5):</label>
        <input type="number" id="rating" name="rating" min="1" max="5" required><br><br>

        <label>Gender:</label>
        <input type="radio" name="gender" value="male"> Male
        <input type="radio" name="gender" value="female"> Female<br><br>
    </fieldset>

    <fieldset class="group">
        <legend>Preferences</legend>
        <label for="topics">Select favorite topics:</label><br>
        <input type="checkbox" name="topics" value="NODE"> NODE
        <input type="checkbox" name="topics" value="JAVA"> JAVA
        <input type="checkbox" name="topics" value="PYTHIN"> PYTHON
        <input type="checkbox" name="topics" value="TS"> TypeScript<br><br>

        <label for="comments">Comments:</label><br>
        <textarea id="comments" name="comments" rows="4" cols="40"></textarea><br><br>
    </fieldset>

    <input type="submit" value="Submit Feedback">
</form>

</body>
</html>
