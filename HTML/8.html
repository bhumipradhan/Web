<!DOCTYPE html>
<html>
<head>
    <title>8.Lists Example</title>
</head>
<body>

<h2>Unordered List</h2>
<ul>
    <li>CSIT</li>
    <li>BCA</li>
    <li>BIM</li>
</ul>

<h2>Ordered List</h2>
<ol>
    <li>First</li>
    <li>Second</li>
    <li>Third</li>
</ol>

<h2>Definition List</h2>
<dl>
    <dt>HTML</dt>
    <dd>HyperText Markup Language</dd>

    <dt>CSS</dt>
    <dd>Cascading Style Sheets</dd>

    <dt>JS</dt>
    <dd>JavaScript</dd>
</dl>

</body>
</html>
