<!DOCTYPE html>
<html>
<head>
    <title>14.User Registration Form</title>
</head>
<body>

<h3>User Registration</h3>

<!-- Form groups all input elements together -->
<form action="#" method="post">
    First Name: <input type="text" name="firstName" required><br><br>
    Last Name: <input type="text" name="lastName" required><br><br>
    Email: <input type="email" name="email" required><br><br>
    Password: <input type="password" name="password" required><br><br>

    Gender:
    <input type="radio" name="gender" value="male" required> Male
    <input type="radio" name="gender" value="female" required> Female<br><br>

    Hobbies:
    <input type="checkbox" name="hobby" value="Playing"> Playing
    <input type="checkbox" name="hobby" value="Coding"> Coding
    <input type="checkbox" name="hobby" value="Dancing"> Dance<br><br>

    Country:
    <select name="country" required>
        <option value="">Select Country</option>
        <option value="Nepal">Nepal</option>
        <option value="Japan">Singapore</option>
        <option value="China">France</option>
    </select><br><br>

    <input type="submit" value="Register">
</form>

</body>
</html>
