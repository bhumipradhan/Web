<!DOCTYPE html>
<html>
<head>
    <title>3.Text Formatting Tags</title>
</head>
<body>

    <p>This is <b>bold text</b> — used to make text stand out.</p>

    <p>This is <i>italic text</i> — used for titles.</p>

    <p>This is <small>smaller text</small> — often used for disclaimers.</p>

    <p>An example of superscript: E = mc<sup>2</sup></p>

    <p>An example of subscript: H<sub>2</sub>O</p>

</body>
</html>
