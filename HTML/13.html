<!DOCTYPE html>
<html>
<head>
    <title>13.Form with ID and Class</title>
    <style>
        /* ID selector  */
        #text {
            border: 2px solid red;
        }

        /* Class selector */
        .cls {
            border: 2px solid green;
        }
    </style>
</head>
<body>

<form>
    <!-- ID example -->
    Name: <input type="text" id="text"><br><br>

    <!-- Class examples -->
    Email: <input type="email" class="cls" ><br><br>
    Password: <input type="password" class="cls"><br><br>

    <input type="submit" value="Submit">
</form>

</body>
</html>
