<!DOCTYPE html>
<html>
<head>
    <title>12.HTML Form</title>
</head>
<body>

<h3>Basic HTML Form</h3>


    Name: <input type="text" name="name" placeholder="Enter your name"><br>
    Password: <input type="password" name="password" placeholder="Enter password"><br>
    
    Gender:
    <input type="radio" name="gender" value="male"> Male
    <input type="radio" name="gender" value="female"> Female<br>
    
    Hobbies:
    <input type="checkbox" name="hobby" value="playing"> Playing
    <input type="checkbox" name="hobby" value="coding"> Coding
    <input type="checkbox" name="hobby" value="Dancing"> Dance<br>
    
    Stream:
    <select name="stream">
        <option>CSIT</option>
        <option>BCA</option>
        <option>BIM</option>
    </select><br>
    
    Message:<br>
    <textarea name="message" rows="4" cols="30"> </textarea><br><br>
    
    <input type="submit" value="Submit">


</body>
</html>
