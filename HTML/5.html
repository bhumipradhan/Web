<!DOCTYPE html>
<html>
<head>
    <title>5.Text Phrase Formatting Tags</title>
</head>
<body>
<p>
    My name is <span style="color:blue; font-weight:bold;">Bhumi Pradhan</span>.
</p>

<p>
    My name is <strong>Bhumi Pradhan</strong>.
</p>

<p>
    My name is <tt>Bhumi Pradhan</tt>.
</p>

</body>
</html>
