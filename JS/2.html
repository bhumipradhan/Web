<!DOCTYPE html>
<html>

<body>
 
    <script>
        // If-Else Even/Odd
        let num = 7;
        if (num % 2 === 0) {
            console.log(num + " is Even");
        } else {
            console.log(num + " is Odd");
        }

        // Loop to print 1 to 10
        console.log("Printing numbers 1 to 10:");
        for (let i = 1; i <= 10; i++) {
            console.log(i);
        }
    </script>
</body>
</html>
