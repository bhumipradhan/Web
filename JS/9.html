<!DOCTYPE html>
<html>
<head>
</head>
<body>
    <h2>Cookies in JS</h2>
    <button onclick="setCookie('username', 'Mandeep', 7)">Set Cookie</button>
    <button onclick="displayCookies()">Show Cookies</button>
    
    <p id="cookieDisplay"></p>

    <script>

        function setCookie(cname, cvalue, exdays) {
            const d = new Date();
            d.setTime(d.getTime() + (exdays*24*60*60*1000));
            let expires = "expires="+ d.toUTCString();
            document.cookie = cname + "=" + cvalue + ";" + expires + ";path=/";
            alert("Cookie Set!");
        }

        function getCookie(cname) {
            let name = cname + "=";
            let decodedCookie = decodeURIComponent(document.cookie);
            let ca = decodedCookie.split(';');
            for(let i = 0; i <ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') {
                    c = c.substring(1);
                }
                if (c.indexOf(name) == 0) {
                    return c.substring(name.length, c.length);
                }
            }
            return "";
        }

        function displayCookies() {
            let user = getCookie("username");
            let displayMsg = document.getElementById("cookieDisplay");
            
            if (user != "") {
                displayMsg.innerHTML = "Welcome back, <b>" + user + "</b>!";
            } else {
                displayMsg.innerHTML = "No cookie found. Please click 'Set Cookie'.";
            }
        }
    </script>
</body>
</html>
