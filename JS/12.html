<!DOCTYPE html>
<html>
<head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        .box { width: 100px; height: 100px; background-color: purple; margin: 10px; display: inline-block; }
    </style>
</head>
<body>
    <h2>jQuery Effects</h2>
    <button id="hideBtn">Hide Box</button>
    <button id="showBtn">Show Box</button>
    <button id="fadeBtn">Fade Toggle</button>
    <button id="slideBtn">Slide Toggle</button>
    <br><br>
    <button id="comboBtn" style="background-color: lightcoral;">Combination Sequence</button>
    <br><br>

    <div id="box1" class="box"></div>
    <div id="box2" class="box" style="background-color: orange;"></div>

    <script>
        $(document).ready(function() {
            // Hide & Show
            $("#hideBtn").click(function() { $("#box1").hide(500); });
            $("#showBtn").click(function() { $("#box1").show(500); });

            // Fade & Slide toggle
            $("#fadeBtn").click(function() { $("#box1").fadeToggle("slow"); });
            $("#slideBtn").click(function() { $("#box1").slideToggle("fast"); });

            // Combination Effect
            $("#comboBtn").click(function() {
                $("#box2").slideUp(1000)
                          .slideDown(1000)
                          .fadeOut(1000)
                          .fadeIn(1000)
                          .animate({
                              width: "200px",
                              height: "200px",
                              opacity: '0.5'
                          });
            });
        });
    </script>
</body>
</html>
