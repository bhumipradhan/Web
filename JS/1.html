<!DOCTYPE html>
<html>
<head>
</head>
<body>
    
    <script>
        let string = "Hello";
        let num = 10;
        let bool= true;

        console.log("String Variable:", string);
        console.log("Number Variable:", num);
        console.log("Boolean Variable:", bool);

        // Operations
        let addition = num + 5;
        let concatenation = string + " World!";
        let logicOp = bool && false;

        console.log("Addition:", addition);
        console.log("Concatenation:", concatenation);
        console.log("Logical Operation (true && false):", logicOp);
    </script>
</body>
</html>
